<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.95" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Rounded rectangle background with glow -->
  <rect width="40" height="40" rx="8" fill="url(#bgGradient)" />
  <circle cx="20" cy="20" r="15" fill="url(#glowGradient)" />

  <!-- Letter R -->
  <path d="M 12,10 L 12,30 M 12,10 L 22,10 C 25,10 27,12 27,15 C 27,17.5 25.5,19 23,19.5 L 28,30 L 24,30 L 19.5,20 L 16,20 M 12,16 L 22,16 C 23,16 23.5,15 23.5,14 C 23.5,13 23,12 22,12 L 16,12"
        stroke="url(#letterGradient)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Subtle sparkle accent -->
  <circle cx="28" cy="12" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="30" cy="10" r="0.8" fill="white" opacity="0.4"/>
</svg>
