<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradientBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect width="40" height="40" rx="8" fill="url(#gradientBg)" />

  <!-- Rocket/Sparkles icon -->
  <g transform="translate(20, 20)">
    <!-- Center star -->
    <path d="M 0,-8 L 1,-2 L 8,-1 L 2,0 L 1,8 L 0,2 L -8,1 L -2,0 Z"
          fill="url(#gradientIcon)"
          opacity="0.9"/>

    <!-- Small sparkle top-right -->
    <path d="M 6,-10 L 6.5,-8 L 9,-7.5 L 7,-7 L 6.5,-5 L 6,-7 L 4,-7.5 L 6,-8 Z"
          fill="url(#gradientIcon)"
          opacity="0.7"/>

    <!-- Small sparkle bottom-left -->
    <path d="M -7,7 L -6.5,9 L -4,9.5 L -6,10 L -6.5,12 L -7,10 L -9,9.5 L -7,9 Z"
          fill="url(#gradientIcon)"
          opacity="0.7"/>

    <!-- Tiny sparkle top-left -->
    <circle cx="-5" cy="-6" r="1" fill="white" opacity="0.6"/>

    <!-- Tiny sparkle bottom-right -->
    <circle cx="5" cy="6" r="1" fill="white" opacity="0.6"/>
  </g>
</svg>
