<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <filter id="favGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0D0D12"/>
  
  <!-- Core diamond mark -->
  <path d="M 32 12 L 52 32 L 32 52 L 12 32 Z" 
        fill="url(#favGrad)" opacity="0.9" filter="url(#favGlow)"/>
  
  <!-- Inner cut to create depth -->
  <path d="M 32 20 L 44 32 L 32 44 L 20 32 Z" 
        fill="#0D0D12" opacity="0.6"/>
  
  <!-- Center dot -->
  <circle cx="32" cy="32" r="4" fill="url(#favGrad)" filter="url(#favGlow)"/>
  
  <!-- Corner nodes -->
  <circle cx="32" cy="12" r="2.5" fill="#A855F7"/>
  <circle cx="52" cy="32" r="2.5" fill="#C084FC"/>
  <circle cx="32" cy="52" r="2.5" fill="#EC4899"/>
  <circle cx="12" cy="32" r="2.5" fill="#C084FC"/>
</svg>
